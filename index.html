<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Bruin Escape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #ff3366;
            font-size: 32px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 4px #000;
        }

        #score {
            margin-top: 8px;
            color: #ffd700;
            font-size: 24px;
        }

        #game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            color: #ff0000;
            font-size: 80px;
            text-align: center;
            text-shadow: 2px 2px 6px black;
            animation: blink-animation 0.8s steps(2, start) infinite;
        }

        #final-score {
            margin-top: 12px;
            font-size: 28px;
            color: #ffd700;
        }

        #restart-text {
            margin-top: 12px;
            font-size: 20px;
            color: white;
        }

        @keyframes blink-animation {
            to {
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="score">Coins: 0</div>
    </div>

    <div id="game-over">
        <div>GAME OVER</div>
        <div id="final-score">Final Score: 0</div>
        <button id="retry-button">Retry</button>
        <button id="game-over-level-select-button">Level Select</button>
    </div>

    <div id="start-screen">
        <h1>Bruin Escape</h1>
        <button id="start-button">Start Game</button>
        <button id="level-select-button">Level Select</button>
    </div>

    <div id="level-select-screen" style="display:none;">
        <h2>Select Level</h2>
        <div id="level-buttons"></div>
        <button id="back-to-start-button">Back</button>
    </div>

    <div id="victory-screen" style="display:none;">
        <h1>You Win!</h1>
        <p id="victory-text"></p>
        <button id="victory-level-select-button">Level Select</button>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
